<!doctype html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#000000" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Aura Pro" />
    <link rel="apple-touch-icon" href="https://picsum.photos/seed/aura/192/192" />
    <link rel="manifest" href="manifest.json" />
    <link rel="icon" type="image/x-icon" href="favicon.ico" />
    <title>Aura Pro Store</title>
    <!-- Service Worker Disabled for Debugging -->
    <script>
      // Clear service workers and caches to prevent stale broken versions
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.getRegistrations().then(function(registrations) {
          for(let registration of registrations) {
            registration.unregister();
          }
        });
      }
      if ('caches' in window) {
        caches.keys().then(function(names) {
          for (let name of names) caches.delete(name);
        });
      }

      window.onerror = function(message, source, lineno, colno, error) {
        var root = document.getElementById('root');
        if (root) {
          root.innerHTML = '<div style="padding:20px;color:red;text-align:center;dir:rtl;">خطأ في التحميل: ' + message + '<br><small>' + source + ':' + lineno + '</small></div>';
        }
      };
      setTimeout(function() {
        var status = document.getElementById('loading-status');
        if (status && status.innerHTML.includes('جاري تحميل المتجر')) {
          status.innerHTML = `
            <div style="display: flex; flex-direction: column; gap: 15px; align-items: center;">
              <p>يبدو أن التحميل يستغرق وقتاً طويلاً بسبب ملفات قديمة مخزنة في متصفحك.</p>
              <button onclick="forceClearAndReload()" style="background: #000; color: #fff; border: none; padding: 12px 24px; border-radius: 12px; font-weight: bold; cursor: pointer;">
                تحديث إجباري ومسح الذاكرة المؤقتة
              </button>
              <p style="font-size: 12px; color: #666; margin-top: 10px;">
                إذا كنت تستخدم Vercel، يرجى التأكد من أن إعدادات البناء صحيحة:<br>
                <b>Framework Preset:</b> Vite | <b>Output:</b> dist
              </p>
            </div>
          `;
        }
      }, 5000);

      function forceClearAndReload() {
        if ('serviceWorker' in navigator) {
          navigator.serviceWorker.getRegistrations().then(function(registrations) {
            for(let registration of registrations) registration.unregister();
          });
        }
        if ('caches' in window) {
          caches.keys().then(function(names) {
            for (let name of names) caches.delete(name);
          });
        }
        localStorage.clear();
        sessionStorage.clear();
        window.location.reload(true);
      }
    </script>
  </head>
  <body style="background-color: #f8f9fa;">
    <div id="root">
      <div style="display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; font-family: sans-serif; color: #333; text-align: center; padding: 20px;">
        <div style="font-size: 24px; font-weight: bold; margin-bottom: 10px;">Aura Pro Store</div>
        <div id="loading-status">جاري تحميل المتجر...</div>
      </div>
    </div>
    <script type="module" src="/src/main.tsx" onerror="document.getElementById('loading-status').innerHTML = 'خطأ: لم يتم تحميل ملفات التطبيق. يرجى التأكد من إعدادات البناء (Build Settings) في Vercel.'"></script>
  </body>
</html>
